# Nadini — Production Docker Compose
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - .env.production with all secrets
#   - SSL certificates in ./certs/ (or use Let's Encrypt)
#   - DNS pointing to server

services:
  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    deploy:
      resources:
        limits:
          memory: 512M

  auth-service:
    restart: always
    environment:
      APP_ENV: production
      LOG_FORMAT: json
      DATABASE_URL: postgresql+asyncpg://admin:${POSTGRES_PASSWORD}@postgres:5432/nadini
      MAILER_DRIVER: resend
      RESEND_API_KEY: ${RESEND_API_KEY}
      MAGIC_LINK_BASE_URL: https://${DOMAIN}/app
      CORS_ORIGINS: https://${DOMAIN}
      SENTRY_DSN: ${SENTRY_DSN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  meeting-service:
    restart: always
    environment:
      APP_ENV: production
      LOG_FORMAT: json
      DATABASE_URL: postgresql+asyncpg://admin:${POSTGRES_PASSWORD}@postgres:5432/nadini
      CORS_ORIGINS: https://${DOMAIN}
      FRONTEND_BASE_URL: https://${DOMAIN}
      SENTRY_DSN: ${SENTRY_DSN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G

  audio-gateway:
    restart: always
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G

  frontend:
    restart: always
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
