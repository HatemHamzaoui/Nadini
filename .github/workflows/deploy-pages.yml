name: Deploy Frontend to GitHub Pages

on:
  workflow_dispatch:  # Manual trigger only — enable Pages in repo settings first
  # push:
  #   branches: [main]
  #   paths:
      - 'landing/**'
      - 'app/**'
      - 'assets/**'
      - 'index.html'
      - '404.html'
      - 'manifest.json'
      - 'sw.js'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build site artifact
        run: |
          mkdir -p _site
          cp -r landing app assets _site/
          cp index.html 404.html manifest.json sw.js _site/
          echo "Files in _site:"
          find _site -type f | wc -l

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
