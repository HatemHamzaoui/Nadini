name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nadini

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-auth:${{ github.ref_name }},${{ env.IMAGE_PREFIX }}-auth:latest

      - name: Build and push meeting-service
        uses: docker/build-push-action@v5
        with:
          context: ./meeting-service
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-meeting:${{ github.ref_name }},${{ env.IMAGE_PREFIX }}-meeting:latest

      - name: Build and push audio-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./audio-gateway
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-audio:${{ github.ref_name }},${{ env.IMAGE_PREFIX }}-audio:latest

  deploy:
    name: Deploy to Server
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.environment == 'production'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/nadini
            git pull origin main
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.production up -d
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
