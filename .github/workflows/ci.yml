name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: Validate HTML/CSS/JS ──
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all HTML files exist and are valid
        run: |
          echo "=== HTML Files ==="
          find landing app -name '*.html' | sort
          echo ""
          echo "=== Check for broken internal links ==="
          ERRORS=0
          for href in $(grep -roh 'href="[^"#]*\.html"' app/ landing/ | sed 's/href="//;s/"$//' | sort -u); do
            # Resolve relative paths
            if [ ! -f "app/$href" ] && [ ! -f "landing/$href" ] && [ ! -f "$href" ]; then
              echo "BROKEN: $href"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "Found $ERRORS broken links"
            exit 1
          fi
          echo "All internal links OK"

      - name: Check i18n completeness
        run: |
          echo "=== Checking i18n key parity ==="
          node -e "
            const fs = require('fs');
            const src = fs.readFileSync('app/i18n-app.js', 'utf-8');
            // Use eval to parse the translations object
            const match = src.match(/const translations = (\{[\s\S]*?\n\});/);
            if (!match) { console.error('Could not parse translations'); process.exit(1); }
            const translations = eval('(' + match[1] + ')');
            const counts = {};
            for (const lang of ['de', 'en', 'fr']) {
              counts[lang] = Object.keys(translations[lang] || {}).length;
              console.log('  ' + lang + ': ' + counts[lang] + ' keys');
            }
            if (counts.de !== counts.en || counts.de !== counts.fr) {
              // Show missing keys
              const deKeys = new Set(Object.keys(translations.de));
              for (const lang of ['en', 'fr']) {
                const langKeys = new Set(Object.keys(translations[lang]));
                const missing = [...deKeys].filter(k => !langKeys.has(k));
                if (missing.length) console.error('  ' + lang + ' missing: ' + missing.join(', '));
              }
              process.exit(1);
            }
            console.log('All languages have equal key counts.');
          "

      - name: Validate manifest.json
        run: |
          node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf-8')); console.log('manifest.json: valid')"

  # ── Backend: Lint + Import Check ──
  backend:
    name: Auth Service Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Type check imports
        run: |
          python -c "
          from app.core.config import Settings;
          from app.api.schemas import MagicLinkRequest, TokenResponse;
          from app.compliance.disclosure import DISCLOSURE_TEXTS;
          print('All imports OK —', len(DISCLOSURE_TEXTS), 'disclosure locales')
          "

  # ── Docker Build ──
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build auth-service image
        run: docker build -t nadini-auth-service ./auth-service

      - name: Build meeting-service image
        run: docker build -t nadini-meeting-service ./meeting-service

      - name: Verify auth-service
        run: docker run --rm nadini-auth-service python -c "from app.core.config import Settings; print('Auth Config OK')"

      - name: Verify meeting-service
        run: docker run --rm nadini-meeting-service python -c "from app.core.config import Settings; print('Meeting Config OK')"
