name: nadini

services:
  # ── Database ──
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nadini
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d nadini"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (Rate Limiting) ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Auth Service (FastAPI) ──
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    environment:
      APP_NAME: nadini-auth
      APP_ENV: development
      LOG_FORMAT: console
      DATABASE_URL: postgresql+asyncpg://admin:devpass@postgres:5432/nadini
      REDIS_URL: redis://redis:6379/0
      JWT_PRIVATE_KEY_PATH: /secrets/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /secrets/jwt-public.pem
      JWT_ISSUER: http://localhost:8001
      JWT_AUDIENCE: nadini
      MAGIC_LINK_BASE_URL: http://localhost:3000/app
      MAILER_DRIVER: console
      MAIL_FROM: no-reply@nadini.ai
      MAIL_FROM_NAME: Nadini
      CORS_ORIGINS: http://localhost:3000,http://localhost:8080
    ports:
      - "8001:8001"
    volumes:
      - ./auth-service/secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8001 --proxy-headers
      "

  # ── Meeting Service (FastAPI + WebSocket) ──
  meeting-service:
    build:
      context: ./meeting-service
      dockerfile: Dockerfile
    environment:
      APP_NAME: nadini-meeting
      APP_ENV: development
      LOG_FORMAT: console
      DATABASE_URL: postgresql+asyncpg://admin:devpass@postgres:5432/nadini
      REDIS_URL: redis://redis:6379/1
      JWKS_URL: http://auth-service:8001/.well-known/jwks.json
      JWT_ISSUER: http://localhost:8001
      JWT_AUDIENCE: nadini
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      MAILER_DRIVER: ${MAILER_DRIVER:-console}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: no-reply@nadini.ai
      MAIL_FROM_NAME: Nadini
      FRONTEND_BASE_URL: http://localhost:${FRONTEND_PORT:-3000}
      DEEPL_API_KEY: ${DEEPL_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GOOGLE_TRANSLATE_API_KEY: ${GOOGLE_TRANSLATE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      PAPAGO_CLIENT_ID: ${PAPAGO_CLIENT_ID:-}
      PAPAGO_CLIENT_SECRET: ${PAPAGO_CLIENT_SECRET:-}
      AZURE_TRANSLATOR_KEY: ${AZURE_TRANSLATOR_KEY:-}
      AZURE_TRANSLATOR_REGION: ${AZURE_TRANSLATOR_REGION:-westeurope}
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8002 --proxy-headers
      "

  # ── Audio Gateway (Whisper ASR) ──
  audio-gateway:
    build:
      context: ./audio-gateway
      dockerfile: Dockerfile
    environment:
      WHISPER_MODEL: base
      MEETING_SERVICE_URL: http://meeting-service:8002
      JWKS_URL: http://auth-service:8001/.well-known/jwks.json
      JWT_ISSUER: http://localhost:8001
      JWT_AUDIENCE: nadini
    ports:
      - "8003:8003"
    depends_on:
      auth-service:
        condition: service_started
      meeting-service:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Frontend (Static Files) ──
  frontend:
    image: nginx:alpine
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./landing:/usr/share/nginx/html/landing:ro
      - ./app:/usr/share/nginx/html/app:ro
      - ./assets:/usr/share/nginx/html/assets:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./404.html:/usr/share/nginx/html/404.html:ro
      - ./manifest.json:/usr/share/nginx/html/manifest.json:ro
      - ./sw.js:/usr/share/nginx/html/sw.js:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - meeting-service
      - audio-gateway

  # ── Monitoring ──
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: nadini
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles: ["monitoring"]

volumes:
  postgres_data:
  grafana_data:
