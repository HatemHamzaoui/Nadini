server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:; media-src 'self' blob:" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # SPA-like routing (exclude API paths)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Audio Gateway WebSocket (Whisper ASR)
    location /audio/ {
        proxy_pass http://audio-gateway:8003/audio/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Provider API
    location /providers {
        proxy_pass http://meeting-service:8002;
        proxy_redirect off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Meeting Service API — prefix match takes priority over try_files
    location /meetings {
        proxy_pass http://meeting-service:8002;
        proxy_redirect off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # Magic Link redirect: /app/auth/magic?token=X → /app/login.html?token=X
    location = /app/auth/magic {
        if ($args ~* "token=(.+)") {
            return 302 /app/login.html?token=$1;
        }
        return 302 /app/login.html;
    }

    # Admin API (auth-service)
    location /admin {
        proxy_pass http://auth-service:8001;
        proxy_redirect off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API requests to auth-service
    location /auth/ {
        proxy_pass http://auth-service:8001/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # Meeting Service WebSocket (must be before REST block)
    location ~ ^/meetings/([^/]+)/ws$ {
        proxy_pass http://meeting-service:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # JWKS endpoint
    location /.well-known/ {
        proxy_pass http://auth-service:8001/.well-known/;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://auth-service:8001/health;
    }

    # OpenAPI Docs
    location /docs/auth {
        proxy_pass http://auth-service:8001/docs;
        proxy_set_header Host $http_host;
    }
    location /docs/meeting {
        proxy_pass http://meeting-service:8002/docs;
        proxy_set_header Host $http_host;
    }

    # Cache static assets
    location ~* \.(css|js|svg|png|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Error page
    error_page 404 /404.html;
}
