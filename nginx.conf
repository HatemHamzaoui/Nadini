server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # SPA-like routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Magic Link redirect: /app/auth/magic?token=X → /app/login.html?token=X
    location = /app/auth/magic {
        if ($args ~* "token=(.+)") {
            return 302 /app/login.html?token=$1;
        }
        return 302 /app/login.html;
    }

    # Proxy API requests to auth-service
    location /auth/ {
        proxy_pass http://auth-service:8001/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # JWKS endpoint
    location /.well-known/ {
        proxy_pass http://auth-service:8001/.well-known/;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        proxy_pass http://auth-service:8001/health;
    }

    # Cache static assets
    location ~* \.(css|js|svg|png|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Error page
    error_page 404 /404.html;
}
